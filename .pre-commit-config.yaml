# Pre-commit hooks for linting and formatting
# Install: brew install pre-commit && pre-commit install && pre-commit install --hook-type pre-push
# Run manually: pre-commit run --all-files

# NOTE: Format and style rules should:
# - Be defined in a single source of truth config file and checked into this repo (use .editorconfig where possible).
# - Use the same underlying tooling across pre-commit hooks,
#   vscode extensions defined in .vscode/extensions.json,
#   and CI tests defined in .github/workflows/test.yml in order to ensure consistency.
# - Lint processes should have a way to run in verbose mode to see which files are being changed (useful for debugging).

repos:
  # Shell formatting (shfmt)
  # Uses .editorconfig for settings (indent_size, binary_next_line, etc.).
  # v3.13+ parses zsh natively (variant detected from the .zsh filename), so
  # zsh files are formatted and validated too - not just bash/sh.
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        # Verbose wrapper that:
        # - Prints "Checking: <file>" for each file
        # - Prints "  Modified: <file>" when a file is reformatted
        # - Lets errors pass through to stderr naturally
        # - Extensionless files get a shell-matching extension appended (via
        #   --filename) for two reasons: it sets shfmt's variant AND makes the
        #   file match the editorconfig shell section. The extension follows the
        #   shebang - .bash / .sh - so a bash script keeps the bash variant;
        #   since shfmt v3.13 the zsh variant rejects bash-isms like ${!arr[@]},
        #   so a blanket .zsh would break every extensionless bash script.
        #   Shebang-less files (zsh config like dot_zshenv) default to .zsh.
        # - Empty shfmt output means file was ignored via editorconfig
        entry: |
          bash -c '
            rc=0
            for f; do
              echo "Checking: $f"
              fn="$f"
              if [[ ! "$f" =~ \.(sh|bash|zsh)$ ]]; then
                case "$(head -1 "$f")" in
                  "#!"*bash*) fn="${f}.bash" ;;
                  "#!"*zsh*)  fn="${f}.zsh" ;;
                  "#!"*sh*)   fn="${f}.sh" ;;
                  *)          fn="${f}.zsh" ;;
                esac
              fi
              before=$(cksum "$f")
              if formatted=$(shfmt --apply-ignore --filename "$fn" < "$f" 2>&1); then
                if [[ -n "$formatted" ]]; then
                  echo "$formatted" > "$f"
                  after=$(cksum "$f")
                  if [[ "$before" != "$after" ]]; then
                    echo "  Modified: $f"
                  fi
                fi
              else
                echo "$formatted" >&2
                rc=1
              fi
            done
            exit $rc
          ' _
        args: [] # Override default -w arg
        #verbose: true # Uncomment this if you want verbose logging.
        # Match shell files by extension or executable_ prefix
        types: [text] # Accept any file type
        exclude_types: [] # Override upstream exclusion of zsh
        files: (\.(sh|bash|zsh)$|\.(sh|bash|zsh)\.tmpl$|executable_|zshrc|zshenv|zprofile|zlogin|zlogout)

  # Shell linting (shellcheck) - for bash/sh files only
  # Shellcheck doesn't support zsh, so we exclude zsh-specific files
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        # Wrapper prints "Checking: <file>" for each file, then runs shellcheck
        entry: |
          bash -c '
            rc=0
            for f; do
              echo "Checking: $f"
              shellcheck --severity=warning "$f" || rc=1
            done
            exit $rc
          ' _
        args: []
        types: [shell]
        exclude: (\.zsh$)
        #verbose: true # Uncomment to see files checked

  # TOML formatting and linting (taplo)
  # Settings in .taplo.toml (indent_tables, align_entries, etc.)
  - repo: https://github.com/ComPWA/mirrors-taplo
    rev: v0.9.3
    hooks:
      - id: taplo-format
        types: [text]
        files: \.toml(\.tmpl)?$
      - id: taplo-lint
        # --no-schema skips the remote schema catalog fetch (which has been
        # failing in CI due to upstream API format change). Syntax-only lint.
        args: [--no-schema]
        types: [text]
        files: \.toml(\.tmpl)?$

  # GitHub Actions workflow linting (actionlint) - validates syntax, expressions,
  # and shellcheck's the run: steps. Only matches .github/workflows/.
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # Markdown linting (markdownlint-cli) - lint only, prettier handles formatting
  # Settings in .markdownlint.yaml
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.43.0
    hooks:
      - id: markdownlint
        types: [markdown]
        exclude: ^(\.github/ISSUE_TEMPLATE/|home/dot_claude/agents/)

  # Prettier for general formatting (json, yaml, markdown, css)
  # Uses .editorconfig for settings (indent_size, end_of_line, etc.)
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        # Override default entry to remove --list-different (which suppresses unchanged files)
        entry: prettier --write --ignore-unknown
        exclude: \.tmpl$

  # Lua formatting (stylua) - config in home/dot_config/nvim/stylua.toml.
  # Pinned to the same version nvim's conform runs (mason stylua) so on-save
  # and pre-commit produce identical output.
  - repo: https://github.com/JohnnyMorganz/StyLua
    rev: v2.4.1
    hooks:
      - id: stylua
        # Scoped to the nvim config - the only lua with a stylua.toml (which
        # both this hook and nvim's conform read). Other lua (test helpers)
        # isn't stylua-managed, so leaving it out avoids default-style churn.
        files: ^home/dot_config/nvim/.*\.lua$

  # Basic file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
        exclude: ^\.vscode/ # VS Code uses JSONC (JSON with comments)
      - id: check-added-large-files

  # Secret detection
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # Branch protection (pre-push)
  - repo: local
    hooks:
      - id: protect-main
        name: protect main branch
        entry: bash -c 'branch=$(git symbolic-ref HEAD 2>/dev/null | sed "s,.*/,,"); [ "$branch" = "main" ] && echo "Direct push to main blocked. Use a PR." && exit 1 || exit 0'
        language: system
        stages: [pre-push]
        always_run: true
        pass_filenames: false
