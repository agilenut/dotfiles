  background     = "#121314"
  foreground     = "#bbbebf"
  black          = "#121314"
  red            = "#ff7b72"
  green          = "#3fb950"
  yellow         = "#d29922"
  blue           = "#58a6ff"
  magenta        = "#bc8cff"
  cyan           = "#39c5cf"
  white          = "#b1bac4"
  bright_black   = "#6e7681"
  bright_red     = "#ffa198"
  bright_green   = "#56d364"
  bright_yellow  = "#e3b341"
  bright_blue    = "#79c0ff"
  bright_magenta = "#d2a8ff"
  bright_cyan    = "#56d4dd"
  bright_white   = "#ffffff"

[themes.dark-2026.syntax]
  comment         = "#8b949e"
  string          = "#a5d6ff"
  escape          = "#7ee787"
  regexp          = "#a5d6ff"
  number          = "#79c0ff"
  keyword         = "#ff7b72"
  keyword_storage = "#ff7b72"
  function        = "#d2a8ff"
  type            = "#7ee787"
  variable        = "#ffa657"
  constant        = "#79c0ff"
  operator        = "#bbbebf"

[themes.dark-2026.ui]
  selection        = "#276782"
  line_highlight   = "#0b0b0c" # bat -H current-line band (darker than bg)
  muted            = "#8b949e"
  diff_add_bg      = "#1a2620"
  diff_change_bg   = "#242526"
  diff_del_bg      = "#26191c"
  diff_add_emph_bg = "#21402b" # brightened changed words within an added line
  diff_del_emph_bg = "#3a2026" # brightened changed words within a removed line
  diff_text        = "#2ea043"
  git_add          = "#3fb950"
  git_change       = "#d29922"
  git_delete       = "#f85149"
  git_untracked    = "#d2a8ff"
  git_conflict     = "#f85149"
  diag_error       = "#ff7b72"
  diag_warn        = "#d29922"
  diag_info        = "#58a6ff"
  diag_hint        = "#6e7681"
