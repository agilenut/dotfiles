# Centralized color palette — single source of truth for all themed tools.
#
# Layers per theme:
#   ansi   — the 16 terminal colors (+ bg/fg). Drives alacritty; oh-my-posh
#            prompt, tmux, lazygit (partly), fzf, eza, and LS_COLORS cascade
#            from these for free.
#   syntax — semantic hex tokens for the syntax tools (bat, delta, nvim via
#            vscode.nvim color_overrides, quicklook).
#   ui     — shared UI accents (selection, muted, diff/git colors).
#
# The active theme is selected by the `theme` field in chezmoi config
# (see .chezmoi.toml.tmpl); switch with the `theme <name>` script.
#
# bright_black is deliberately the muted grey #6e7681 (not #666666) so the
# "muted/dim" grey is one value across tmux/lazygit/nvim/quicklook.

[themes.vscode-dark-modern.ansi]
  background     = "#1f1f1f"
  foreground     = "#c6c6c6"
  black          = "#1f1f1f"
  red            = "#d16969"
  green          = "#6a9955"
  yellow         = "#ce9178"
  blue           = "#569cd6"
  magenta        = "#646695"
  cyan           = "#4ec9b0"
  white          = "#c6c6c6"
  bright_black   = "#6e7681"
  bright_red     = "#e08f8f"
  bright_green   = "#a4c98b"
  bright_yellow  = "#e0bc9f"
  bright_blue    = "#8cbceb"
  bright_magenta = "#c586c0"
  bright_cyan    = "#4ec9b0"
  bright_white   = "#e5e5e5"

[themes.vscode-dark-modern.syntax]
  comment         = "#6a9955"
  string          = "#ce9178"
  escape          = "#d7ba7d"
  regexp          = "#d16969"
  number          = "#b5cea8"
  keyword         = "#c586c0" # control flow (pink)
  keyword_storage = "#569cd6" # storage / declaration (blue)
  function        = "#dcdcaa"
  type            = "#4ec9b0"
  variable        = "#9cdcfe"
  constant        = "#4fc1ff"
  operator        = "#c6c6c6"

[themes.vscode-dark-modern.ui]
  selection        = "#37373d"
  line_highlight   = "#0f0f0f" # bat -H current-line band (darker than bg)
  muted            = "#6e7681"
  diff_add_bg      = "#1f3a29"
  diff_change_bg   = "#1f3a29"
  diff_del_bg      = "#3d2027"
  diff_add_emph_bg = "#274a30" # brightened changed words within an added line
  diff_del_emph_bg = "#42272d" # brightened changed words within a removed line
  diff_text        = "#4a9d64"
  git_add          = "#55805f"
  git_change       = "#d7ba7d"
  git_delete       = "#7d5159"
  git_untracked    = "#c586c0"
  git_conflict     = "#d16969"
  diag_error       = "#d16969"
  diag_warn        = "#d7ba7d"
  diag_info        = "#569cd6"
  diag_hint        = "#6e7681"

# Dark 2026 (GitHub-Dark family). Syntax from VS Code's 2026-dark.json; ANSI
