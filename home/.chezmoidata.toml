# Chezmoi data - packages and profile configurations
# These are automatically merged with template data

# =============================================================================
# CORE PACKAGES - OS-specific, installed for ALL profiles (alphabetized)
# =============================================================================

[packages.darwin]
  core = [
    "age",
    "bat",
    "chezmoi",
    "duti",
    "eza",
    "fd",
    "fzf",
    "gh",
    "git",
    "git-credential-manager",
    "jq",
    "mise",
    "neovim",
    "pam-reattach",
    "ripgrep",
    "tmux",
    "tree",
    "zoxide",
    "zsh",
  ]

[packages.linux.apt]
  # Note: eza not in standard apt repos; GCM installed separately
  # Note: mise not in standard apt repos; install via PPA (ppa:jdxcode/mise)
  #       or upstream install script — see https://mise.jdx.dev/installing-mise.html
  # Note: age requires Debian 12+ / Ubuntu 22.04+ in main repos; older
  #       releases need the upstream binary from github.com/FiloSottile/age
  core = [
    "age",
    "bat",
    "fd-find",
    "fzf",
    "git",
    "jq",
    "neovim",
    "ripgrep",
    "tmux",
    "tree",
    "zoxide",
    "zsh",
  ]

[packages.linux.dnf]
  # Note: mise not in standard dnf repos; install via COPR
  #       (dnf copr enable jdxcode/mise) or upstream install script
  # Note: age is in Fedora repos; on RHEL/CentOS you may need EPEL or the
  #       upstream binary from github.com/FiloSottile/age
  core = [
    "age",
    "bat",
    "eza",
    "fd-find",
    "fzf",
    "git",
    "jq",
    "neovim",
    "ripgrep",
    "tmux",
    "tree",
    "zoxide",
    "zsh",
  ]

[packages.linux.pacman]
  core = [
    "age",
    "bat",
    "eza",
    "fd",
    "fzf",
    "git",
    "jq",
    "mise",
    "neovim",
    "ripgrep",
    "tmux",
    "tree",
    "zoxide",
    "zsh",
  ]

  # =============================================================================
  # PROFILES - Dev tools and apps are profile-specific (alphabetized)
  # =============================================================================

[profiles.personal.github]
  name       = "agilenut"
  email      = "705864+agilenut@users.noreply.github.com"
  signingkey = "~/.ssh/id_ed25519_git_signing_key_personal.pub"

[profiles.personal.packages.darwin]
  dev       = [ "dotnet-sdk", "git-ignore", "go", "powershell", "shellcheck", "shfmt" ]
  quicklook = [ "qlmarkdown", "syntax-highlight" ]

[[profiles.personal.apps.casks]]
  name = "1password"
  app  = "1Password"

# CLI cask — installs `op` to /opt/homebrew/bin/op. No .app bundle, so the
# brew_cask_install .app-existence check intentionally falls through to the
# `brew list --cask` check. README's Per-Machine Setup assumes `op` is present
# (used by fetch-git-signing-key-personal and fetch-chezmoi-age-key).
[[profiles.personal.apps.casks]]
  name = "1password-cli"
  app  = "1Password CLI"

[[profiles.personal.apps.casks]]
  name = "alfred"
  app  = "Alfred 5"

[[profiles.personal.apps.casks]]
  name = "appcleaner"
  app  = "AppCleaner"

[[profiles.personal.apps.casks]]
  name = "firefox"
  app  = "Firefox"

[[profiles.personal.apps.casks]]
  name = "google-chrome"
  app  = "Google Chrome"

[[profiles.personal.apps.casks]]
  name = "logi-options-plus"
  app  = "Logi Options+"

[[profiles.personal.apps.casks]]
  name = "rectangle-pro"
  app  = "Rectangle Pro"

[[profiles.personal.apps.casks]]
  name = "visual-studio-code"
  app  = "Visual Studio Code"

[[profiles.personal.apps.casks]]
  name = "warp"
  app  = "Warp"

