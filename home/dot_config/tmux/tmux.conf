# =============================================================================
# GENERAL
# =============================================================================

# Prefix: C-a (easier than C-b)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Modern terminal with true color
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# 1-indexed windows/panes (0 is far from prefix key)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Mouse support (hold Shift to bypass tmux for native terminal selection)
set -g mouse on

# Allow inner programs to send escape sequences (e.g. OSC 7 cwd reports)
# directly to the outer terminal. Required for Alacritty to know the
# active pane's cwd so hint commands resolve relative paths correctly.
set -g allow-passthrough on

# Faster escape (for vim)
set -sg escape-time 50

# Larger scrollback (default 2000 is small for log tailing)
set -g history-limit 50000

# Focus events — needed for nvim autoread + cursor-shape sync
set -g focus-events on

# Refresh status bar every 5s so git counts feel responsive
set -g status-interval 5

# Killing a session jumps to another instead of dropping out of tmux
set -g detach-on-destroy off

# Display messages for 2s (default 750ms is too brief)
set -g display-time 2000

# Only resize a window when the smallest attached client is viewing it
setw -g aggressive-resize on

# Reload config (lowercase r; Shift+R is resurrect restore)
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# =============================================================================
# NAVIGATION
# =============================================================================

# Intuitive splits (| and -)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window inherits current pane's directory (splits already do)
bind c new-window -c "#{pane_current_path}"

# Ctrl+hjkl: move between tmux panes AND nvim splits as one grid (vim-tmux-navigator).
# Passes the key through to the program when vim/nvim/fzf owns the pane.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind -T copy-mode-vi 'C-h' select-pane -L
bind -T copy-mode-vi 'C-j' select-pane -D
bind -T copy-mode-vi 'C-k' select-pane -U
bind -T copy-mode-vi 'C-l' select-pane -R
# C-l used to clear the screen; reclaim it under the prefix.
bind C-l send-keys 'C-l'

# Alt+h/l: prev/next window (tab), no prefix; Alt+H/L: move the current window.
# Panes/splits are on Ctrl+hjkl above; windows (tabs) are the Alt axis.
bind -n M-h previous-window
bind -n M-l next-window
bind -n M-H swap-window -t -1 \; previous-window
bind -n M-L swap-window -t +1 \; next-window
# Alt+1..9: jump straight to a window by number (no prefix).
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# VIM resizing with prefix + H/J/K/L (hold for continuous resize)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Swap windows with prefix + < or > (hold for continuous swap)
bind -r < swap-window -t -1 \; previous-window
bind -r > swap-window -t +1 \; next-window

# Quickly switch to last active window with prefix + Tab
bind Tab last-window

# Lazygit popup; -b rounded + dim border so it doesn't glare bright white.
# -d: open in the pane's cwd (default is the session start dir, so lazygit
# would prompt "create a new repo?" outside it).
bind-key g display-popup -E -d '#{pane_current_path}' -w 90% -h 90% -b rounded -S 'fg=brightblack' lazygit
# prefix G: fzf-pick any repo/worktree under ~/repos, open lazygit there
# (for when the pane's cwd isn't the repo you want).
bind-key G display-popup -E -w 90% -h 90% -b rounded -S 'fg=brightblack' "$HOME/.local/bin/lazygit-pick"

# =============================================================================
# COPY MODE
# =============================================================================

# Use vi keybindings in copy mode
setw -g mode-keys vi

# Enter copy mode: C-a [
# Select: v (visual), V (line), or mouse drag
# Copy: y (yanks to system clipboard)
# Paste: C-a ]
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Mouse drag auto-copies to system clipboard on release (stays in pane bounds)
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# =============================================================================
# TITLE BAR
# =============================================================================

set -g set-titles on
set -g set-titles-string "#S · #W"

# Auto-name each window after its foreground program — except claude panes,
# which are labeled with the Claude session name (parsed from the pane title
# claude sets as `<glyph> <session-name>`). An unnamed session shows the short
# `claude` rather than claude's default `Claude Code` title. A manual `prefix ,`
# rename still wins; it turns automatic-rename off for that window.
set -g automatic-rename on
set -g automatic-rename-format '#{?#{==:#{pane_current_command},claude},#{?#{==:#{s|^[^ ]* ||:pane_title},Claude Code},claude,#{s|^[^ ]* ||:pane_title}},#{pane_current_command}}'

# =============================================================================
# STATUS BAR (matches oh-my-posh zen theme)
# =============================================================================

set -g status-style 'bg=default fg=white'
set -g status-left '#[fg=cyan,bold]#S #[fg=default]│ '
set -g status-left-length 20

set -g status-right '#(~/.local/bin/tmux-git-status "#{pane_current_path}") #[fg=brightblack]#(echo "#{pane_current_path}" | sed "s|$HOME|~|") · %H:%M'
set -g status-right-length 80

set -g window-status-format '#[fg=brightblack]#I:#W'
set -g window-status-current-format '#[fg=blue,bold]#I:#W'
set -g window-status-separator '  '

# Pane borders
set -g pane-border-style 'fg=brightblack'
set -g pane-active-border-style 'fg=cyan'

# =============================================================================
# PLUGINS (via TPM)
# =============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect settings
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'
# Replay these programs on restore (resurrect leaves a bare shell otherwise):
#   claude  → re-run as `claude-restore`, which resumes the session named in the
#             pane title (see ~/.local/bin/claude-restore).
#   lazygit → re-run as-is in the pane's restored cwd. Stateless, so it just
#             reopens on the same repo; full-pane only (popups aren't panes, so
#             resurrect never captures them).
# The embedded double quotes around the claude entry are REQUIRED: resurrect does
# `eval set $(restore_list)`, and without them the `>` in the inline strategy is
# parsed as a shell redirect (mangling it to `claude-` + `> claude-restore`), so
# the match silently fails. `lazygit` is a plain word and needs no quoting.
set -g @resurrect-processes '"claude->claude-restore" lazygit'

# Cold-start coordination: when a restore finishes, flag it so the
# `tmux-coldstart` launcher (see ~/.local/bin/tmux-coldstart) knows the
# end-of-restore `switch-client` has already fired and it's safe to attach
# without being yanked onto the save-time active session. This hook runs LAST
# in restore (after that switch-client), so the flag genuinely means "the yank
# is done". Plain single quotes are fine here - unlike @resurrect-processes
# above, resurrect runs hooks via a single `eval "$hook"` (not `eval set`), and
# the value has no `>` to be misparsed.
set -g @resurrect-hook-post-restore-all 'tmux set-option -g @restore-complete 1'

# Continuum settings
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM (keep at bottom)
run '~/.config/tmux/plugins/tpm/tpm'
